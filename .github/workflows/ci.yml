name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify Bun
        run: bun -v

      - name: Install dependencies
        run: bun install

      - name: Run tests with coverage and produce JUnit
        run: |
          # Run tests with coverage and emit JUnit XML to test-results.xml
          bun test tests/ --coverage --reporter=junit > test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload coverage (if produced)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
