name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify Bun
        run: bun -v

      - name: Install dependencies
        run: bun install

      - name: Run tests with coverage and produce JUnit
        run: |
          bun test tests/cors.test.ts tests/cors.module.test.ts tests/factory.test.ts tests/request-response.test.ts tests/protected.routes.test.ts tests/global-prefix.module.test.ts tests/auth.extra.test.ts tests/nestjs-features.test.ts tests/phase6-features.test.ts tests/decorators/ --coverage --reporter=junit --reporter-outfile=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload coverage (if produced)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
